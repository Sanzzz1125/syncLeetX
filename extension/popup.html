<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <title>SyncLeetX</title>

        <link rel="stylesheet" href="popup.css" />
    </head>
    <body>
        <div class="container">
            <div class="top-card">
                <div>
                    <h1>SyncLeetX ⚡</h1>
                    <p>Track • Sync • Dominate</p>
                </div>

                <div class="logo">🚀</div>
                <div class="top-actions">
                    <button id="settingsToggle">⚙️</button>
                </div>
            </div>

            <div class="stats-grid">
                <div class="card total-card">
                    <span>Total Solved</span>
                    <h2 id="totalSolved">0</h2>
                </div>

                <div class="card easy-card">
                    <span>Easy</span>
                    <h2 id="easySolved">0</h2>
                </div>

                <div class="card medium-card">
                    <span>Medium</span>
                    <h2 id="mediumSolved">0</h2>
                </div>

                <div class="card hard-card">
                    <span>Hard</span>
                    <h2 id="hardSolved">0</h2>
                </div>
            </div>

            <div class="profile-card">
                <div class="profile-left">
                    <div class="avatar">👨‍💻</div>

                    <div>
                        <h3 id="username">Loading...</h3>
                        <p>LeetCode Warrior</p>
                    </div>
                </div>
            </div>

            <div class="latest-card">
                <p>Latest Solved</p>
                <h3 id="latestProblem">Loading...</h3>
            </div>

            <div class="footer">
                <span>Powered by SyncLeetX ⚡</span>
            </div>
        </div>
        <div class="settings-modal hidden" id="settingsModal">
            <div class="settings-card">
                <h3>Sync Settings</h3>

                <input
                    type="text"
                    id="githubUsername"
                    placeholder="GitHub Username"
                />

                <input
                    type="text"
                    id="repoName"
                    placeholder="Repository Name"
                />

                <input
                    type="password"
                    id="githubToken"
                    placeholder="GitHub Token"
                />

                <button id="saveBtn">Save Settings</button>
            </div>
        </div>

        <script src="popup.js"></script>
    </body>
</html>
